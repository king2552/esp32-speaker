name: Build ESP32-S3 USB Speaker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        run: |
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
          git clone --recursive --depth 1 --branch v5.2.1 https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh esp32s3

      - name: Build
        run: |
          . ~/esp-idf/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-usb-speaker-bins
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/esp32s3-usb-speaker.bin
          retention-days: 30
